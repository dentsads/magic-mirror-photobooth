<div *ngIf="componentData" id="overlay-outer">
    <canvas id="canvas" width="200px" height="200px"></canvas>
    <img (load)="handleImage()" class="image" src="{{componentData.context.photoPath}}" />
    <div (click)="handleEvent('event.accept-photo.01')" class="overlay-left"><img src="{{componentData.assetButtonOkPath}}"></div>
    <div (click)="handleEvent('event.accept-photo.02')" class="overlay-right"><img src="{{componentData.assetButtonNokPath}}"></div>
</div>
